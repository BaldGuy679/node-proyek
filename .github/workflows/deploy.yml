name: CI/CD Pipeline - Node.js

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: Unit Testing
  # ─────────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ─────────────────────────────────────────────────────
  # JOB 2: Deploy ke VPS
  # ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record deployment start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e

            echo "=== [1/5] Pulling latest code ==="
            cd /var/www/node-cd-demo
            git pull origin main

            echo "=== [2/5] Installing dependencies ==="
            npm ci --omit=dev

            echo "=== [3/5] Restarting service ==="
            pm2 restart node-cd-demo || pm2 start app.js --name node-cd-demo
            pm2 save

            echo "=== [4/5] Waiting for service ==="
            sleep 3

            echo "=== [5/5] Health check ==="
            for i in {1..10}; do
              if curl -sf http://localhost:3000/api/health; then
                echo ""
                echo "✅ Deployment Node.js berhasil!"
                exit 0
              fi
              echo "Attempt $i/10 gagal, retry dalam 3s..."
              sleep 3
            done
            echo "❌ Health check gagal"
            pm2 logs node-cd-demo --lines 30 --nostream
            exit 1

      - name: Calculate deployment duration
        if: always()
        run: |
          END=$(date +%s%3N)
          START=${{ steps.timer.outputs.start }}
          DURATION=$(( END - START ))
          DURATION_SEC=$(echo "scale=2; $DURATION/1000" | bc)

          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ Success"
          else
            STATUS="❌ Failed"
          fi

          echo "### 🚀 Deployment Metrics — Node.js" >> $GITHUB_STEP_SUMMARY
          echo "| Metric        | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status        | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework     | Node.js / Express |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration      | ${DURATION_SEC}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit        | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch        | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by  | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
