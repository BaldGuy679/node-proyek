name: CI/CD Pipeline - Node.js

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==================================================
  # JOB 1 - Unit Test
  # ==================================================
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

  # ==================================================
  # JOB 2 - Deploy to VPS
  # ==================================================
  deploy:
    name: Deploy to VPS
    needs: test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Record Deployment Start Time
        id: timer
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m

          script: |
            set -e

            echo "=================================="
            echo "🚀 Deploy Node.js Application"
            echo "=================================="

            DEPLOY_DIR="/var/www/node-proyek"

            echo "=== [1/6] Masuk ke folder project ==="

            cd $DEPLOY_DIR

            echo "=== [2/6] Update source code ==="

            git fetch origin
            git reset --hard origin/main

            echo "=== [3/6] Install dependencies ==="

            npm ci --omit=dev

            echo "=== [4/6] Restart PM2 ==="

            pm2 restart node-cd-demo || pm2 start app.js --name node-cd-demo

            pm2 save

            echo "=== [5/6] Menunggu aplikasi aktif ==="

            sleep 5

            echo "=== [6/6] Health Check ==="

            for i in {1..10}; do

              if curl -sf http://localhost:3000/api/health >/dev/null; then
                echo "✅ Health Check Berhasil"
                exit 0
              fi

              echo "Percobaan $i gagal..."
              sleep 3

            done

            echo ""
            echo "❌ Deployment gagal"

            pm2 status

            echo ""

            pm2 logs node-cd-demo --lines 30 --nostream

            exit 1

      - name: Deployment Summary
        if: always()

        run: |
          END=$(date +%s%3N)
          START=${{ steps.timer.outputs.start }}

          DURATION=$((END-START))
          DURATION_SEC=$(echo "scale=2; $DURATION/1000" | bc)

          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ Success"
          else
            STATUS="❌ Failed"
          fi

          {
            echo "## 🚀 Deployment Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Status | $STATUS |"
            echo "| Framework | Node.js / Express |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Trigger | ${{ github.actor }} |"
            echo "| Deployment Path | /var/www/node-proyek |"
            echo "| PM2 Process | node-cd-demo |"
            echo "| Duration | ${DURATION_SEC}s |"
          } >> $GITHUB_STEP_SUMMARY